<svg xmlns="http://www.w3.org/2000/svg" width="620" height="500" viewBox="0 0 620 500" role="img">
<style>
.title{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
.label{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.num{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.axis,.legend,.note{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
.inside{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white}
.big{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="150" y="38" class="title">図7. 医師予測と患者本人の外来受容性</text>
<text x="300" y="82" text-anchor="middle" class="axis">患者本人: 外来非受容/保留</text>
<text x="450" y="82" text-anchor="middle" class="axis">患者本人: 外来受容</text>
<text x="40" y="195.0" class="axis">医師予測: 非受容</text>
<text x="40" y="345.0" class="axis">医師予測: 受容</text>
<rect x="150" y="120" width="150" height="150" fill="#eef2f6" stroke="#ffffff" stroke-width="3"/>
<text x="225.0" y="203.0" text-anchor="middle" class="big">40</text>
<rect x="300" y="120" width="150" height="150" fill="#d4f0f4" stroke="#ffffff" stroke-width="3"/>
<text x="375.0" y="203.0" text-anchor="middle" class="big">73</text>
<rect x="150" y="270" width="150" height="150" fill="#f0e7d8" stroke="#ffffff" stroke-width="3"/>
<text x="225.0" y="353.0" text-anchor="middle" class="big">17</text>
<rect x="300" y="270" width="150" height="150" fill="#2f7d8c" stroke="#ffffff" stroke-width="3"/>
<text x="375.0" y="353.0" text-anchor="middle" class="big">50</text>
<text x="150" y="462" class="note">右上: 医師は非受容と予測したが、患者本人は外来導入を受け入れる層。</text>
</svg>