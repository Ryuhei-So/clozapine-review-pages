<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img">
<style>
.title{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
.label{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.num{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.axis,.legend,.note{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
.inside{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white}
.big{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="260" y="30" class="title">図6. 副作用別にみた服用判断への影響</text>
<line x1="260.0" y1="58" x2="260.0" y2="404" stroke="#eef2f6"/>
<text x="260.0" y="424" text-anchor="middle" class="axis">1</text>
<line x1="405.5" y1="58" x2="405.5" y2="404" stroke="#eef2f6"/>
<text x="405.5" y="424" text-anchor="middle" class="axis">2</text>
<line x1="551.0" y1="58" x2="551.0" y2="404" stroke="#eef2f6"/>
<text x="551.0" y="424" text-anchor="middle" class="axis">3</text>
<line x1="696.5" y1="58" x2="696.5" y2="404" stroke="#eef2f6"/>
<text x="696.5" y="424" text-anchor="middle" class="axis">4</text>
<line x1="842.0" y1="58" x2="842.0" y2="404" stroke="#eef2f6"/>
<text x="842.0" y="424" text-anchor="middle" class="axis">5</text>
<text x="248" y="89.1" text-anchor="end" class="label">眠気・だるさ（比較的よくみられる）</text>
<rect x="260" y="70.7" width="274.0" height="26.5" fill="#2f7d8c"/>
<text x="542.0" y="89.1" class="num">2.9</text>
<text x="248" y="146.8" text-anchor="end" class="label">よだれ・流涎（比較的よくみられる）</text>
<rect x="260" y="128.4" width="228.8" height="26.5" fill="#2f7d8c"/>
<text x="496.8" y="146.8" class="num">2.6</text>
<text x="248" y="204.5" text-anchor="end" class="label">体重増加・代謝異常（比較的よくみられる）</text>
<rect x="260" y="186.0" width="290.2" height="26.5" fill="#2f7d8c"/>
<text x="558.2" y="204.5" class="num">3.0</text>
<text x="248" y="262.1" text-anchor="end" class="label">便秘（比較的よくみられる・重くなることがある）</text>
<rect x="260" y="243.7" width="257.1" height="26.5" fill="#2f7d8c"/>
<text x="525.0" y="262.1" class="num">2.8</text>
<text x="248" y="319.8" text-anchor="end" class="label">白血球減少・感染リスク（まれだが重要）</text>
<rect x="260" y="301.4" width="342.7" height="26.5" fill="#2f7d8c"/>
<text x="610.7" y="319.8" class="num">3.4</text>
<text x="248" y="377.5" text-anchor="end" class="label">心筋炎など重い副作用（まれだが重要）</text>
<rect x="260" y="359.0" width="378.3" height="26.5" fill="#2f7d8c"/>
<text x="646.3" y="377.5" class="num">3.6</text>
<text x="551.0" y="448" text-anchor="middle" class="axis">平均スコア（1=妨げにならない、5=服用を考えられないほど妨げる）</text>
</svg>