<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" role="img">
<style>
.title{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
.label{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.num{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24323d}
.axis,.legend,.note{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52616b}
.inside{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white}
.big{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="240" y="30" class="title">図3. 通院のみ条件を拒否した理由</text>
<text x="228" y="103.9" text-anchor="end" class="label">通院回数・移動の負担が大きい</text>
<rect x="240" y="72.8" width="536.0" height="45.9" fill="#2f7d8c"/>
<text x="784.0" y="103.9" class="num">146</text>
<text x="228" y="185.9" text-anchor="end" class="label">この通院回数だけでは安全面が不安</text>
<rect x="240" y="154.8" width="264.3" height="45.9" fill="#2f7d8c"/>
<text x="512.3" y="185.9" class="num">72</text>
<text x="228" y="267.9" text-anchor="end" class="label">クロザピン自体を使いたくない</text>
<rect x="240" y="236.8" width="95.5" height="45.9" fill="#2f7d8c"/>
<text x="343.5" y="267.9" class="num">26</text>
<text x="228" y="349.9" text-anchor="end" class="label">その他・わからない</text>
<rect x="240" y="318.8" width="80.8" height="45.9" fill="#2f7d8c"/>
<text x="328.8" y="349.9" class="num">22</text>
<line x1="240" y1="386" x2="776" y2="386" stroke="#1f2933"/>
<text x="508.0" y="424" text-anchor="middle" class="axis">人数（複数理由あり）</text>
</svg>