<rect width="100%" height="100%" fill="white"/>
<text x="240" y="30" class="title">図5. 訪問看護追加でも受容に転じない理由</text>
<text x="228" y="103.9" text-anchor="end" class="label">訪問看護が入ること自体が嫌</text>
<rect x="240" y="72.8" width="536.0" height="45.9" fill="#2f7d8c"/>
<text x="784.0" y="103.9" class="num">14</text>
<text x="228" y="185.9" text-anchor="end" class="label">訪問看護の回数が多すぎる</text>
<rect x="240" y="154.8" width="497.7" height="45.9" fill="#2f7d8c"/>
<text x="745.7" y="185.9" class="num">13</text>
<text x="228" y="267.9" text-anchor="end" class="label">それでも安全面が不安</text>
<rect x="240" y="236.8" width="306.3" height="45.9" fill="#2f7d8c"/>
<text x="554.3" y="267.9" class="num">8</text>
<text x="228" y="349.9" text-anchor="end" class="label">その他・わからない</text>
<rect x="240" y="318.8" width="191.4" height="45.9" fill="#2f7d8c"/>
<text x="439.4" y="349.9" class="num">5</text>
<line x1="240" y1="386" x2="776" y2="386" stroke="#1f2933"/>
<text x="508.0" y="424" text-anchor="middle" class="axis">人数</text>
</svg>