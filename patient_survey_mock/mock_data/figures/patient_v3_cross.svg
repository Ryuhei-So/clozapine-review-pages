<style>text{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",Arial,sans-serif;fill:#17222b}.title{font-size:20px;font-weight:700}.head{font-size:15px;font-weight:700}.cell{stroke:#fff;stroke-width:3}.num{font-size:26px;font-weight:700}.lab{font-size:14px}</style>
