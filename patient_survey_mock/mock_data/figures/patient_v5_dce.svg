<svg xmlns="http://www.w3.org/2000/svg" width="900" height="398" viewBox="0 0 900 398">
<style>text{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",Arial,sans-serif;fill:#17222b}.title{font-size:20px;font-weight:700}.lab{font-size:14px}.axis{stroke:#8fa0aa}.ci{stroke:#2f7f92;stroke-width:3}.dot{fill:#2f7f92}.zero{stroke:#b7c3cb;stroke-dasharray:4 4}.num{font-size:13px}</style>
